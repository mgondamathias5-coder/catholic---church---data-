<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Members List</title>

<link rel="stylesheet" href="style.css">

<style>
.container{
    max-width:1000px;
    margin:20px auto;
    padding:20px;
}
h2{
    color:#006341;
    text-align:center;
}
input{
    width:100%;
    padding:10px;
    margin:15px 0;
    border:1px solid #ccc;
    border-radius:6px;
}
table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
}
th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:left;
}
th{
    background:#006341;
    color:#fff;
}
tr:nth-child(even){
    background:#f8f8f8;
}
</style>
</head>

<body>

<div class="container">

<h2>Church Members</h2>

<input type="text" id="search" placeholder="Search Member...">

<table>
<thead>
<tr>
<th>Name</th>
<th>Gender</th>
<th>Phone</th>
<th>Parish</th>
</tr>
</thead>

<tbody id="membersTable">
</tbody>

</table>

</div>

<script type="module" src="firebase-config.js"></script>
<script type="module" src="members-list.js"></script>

</body>
</html>
